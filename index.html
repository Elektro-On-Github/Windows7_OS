<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="ElektroWindows - WebOS">
    <meta name="keywords" content="ElektroWindows">
    <meta name="author" content="ElektroWindows">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="7.css">
</head>
<body>

<!-- div.background wrappa TUTTO per il blur effect -->
<div class="background">
    <img src="w7.jpg" class="wallpaper">

    <div class="deskicon">
        <div class="icon" id="icon-ie">
            <img src="ie.png">
            <span>Internet Explorer</span>
        </div>
        <div class="icon" id="icon-start">
            <img src="start.png">
            <span>Start menu</span>
        </div>
    </div>

    <!-- Le finestre dinamiche verranno aggiunte qui -->
    <div id="windows-container"></div>

    <div class="bottombar">
        <img src="start.png" class="start-btn">
        <div class="separator"></div>
        <img src="ie.png" class="app-btn">
    </div>
</div>

<script>
// Drag & drop per finestre stile Windows 7
function makeDraggable(win) {
  let isDragging = false, offsetX = 0, offsetY = 0;
  const handle = win.querySelector('.drag-handle');
  handle.style.cursor = 'move';
  handle.addEventListener('mousedown', function(e) {
    isDragging = true;
    const rect = win.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    win.style.zIndex = 10001;
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    win.style.left = (e.clientX - offsetX) + 'px';
    win.style.top = (e.clientY - offsetY) + 'px';
  });
  document.addEventListener('mouseup', function() {
    isDragging = false;
    document.body.style.userSelect = '';
    win.style.zIndex = '';
  });
}

function createWindow({id, title, content, icon}) {
  // Se già esiste, porta in primo piano
  let existing = document.getElementById(id);
  if (existing) {
    existing.style.display = '';
    existing.style.zIndex = 10001;
    return;
  }
  const win = document.createElement('div');
  win.className = 'window glass active draggable';
  win.id = id;
  win.style.position = 'absolute';
  win.style.left = Math.floor(Math.random()*200+100) + 'px';
  win.style.top = Math.floor(Math.random()*100+80) + 'px';
  win.style.maxWidth = '400px';
  win.innerHTML = `
    <div class="title-bar drag-handle">
        <div class="title-bar-text">${icon ? `<img src='${icon}' style='height:16px;vertical-align:middle;margin-right:6px;'>` : ''}${title}</div>
        <div class="title-bar-controls">
            <button class="btn-min" aria-label="Minimize"></button>
            <button class="btn-max" aria-label="Maximize"></button>
            <button class="btn-close" aria-label="Close"></button>
        </div>
    </div>
    <div class="window-body has-space">${content}</div>
  `;
  document.getElementById('windows-container').appendChild(win);
  makeDraggable(win);
  // Chiudi
  win.querySelector('.btn-close').onclick = () => win.remove();
  // Maximize/Restore
  let isMax = false, prev = {};
  win.querySelector('.btn-max').onclick = function() {
    if (!isMax) {
      prev = {left: win.style.left, top: win.style.top, width: win.style.width, height: win.style.height, maxWidth: win.style.maxWidth};
      win.style.left = '0px';
      win.style.top = '0px';
      win.style.width = '100vw';
      win.style.height = '100vh';
      win.style.maxWidth = 'none';
      win.style.zIndex = 10001;
      isMax = true;
    } else {
      win.style.left = prev.left;
      win.style.top = prev.top;
      win.style.width = prev.width;
      win.style.height = prev.height;
      win.style.maxWidth = prev.maxWidth;
      isMax = false;
    }
  };
  // Minimize
  win.querySelector('.btn-min').onclick = function() {
    win.style.display = 'none';
  };
}

// Funzione per Internet Explorer
function openIEWindow() {
  createWindow({
    id: 'window-ie',
    title: 'Internet Explorer',
    icon: 'ie.png',
    content: `<iframe src='https://www.example.com' style='width:100%;height:300px;border:0;'></iframe>`
  });
}

// Funzione per Start Menu
function openStartMenuWindow() {
  createWindow({
    id: 'window-start',
    title: 'Start Menu',
    icon: 'start.png',
    content: `<ul style='list-style:none;padding:0;margin:0;'>
      <li><b>Programmi</b></li>
      <li>Accessori</li>
      <li>Impostazioni</li>
      <li>Documenti</li>
      <li>Arresta il sistema</li>
    </ul>`
  });
}

// Collega le icone
document.getElementById('icon-ie').onclick = openIEWindow;
document.getElementById('icon-start').onclick = openStartMenuWindow;
</script>

</body>
</html>
