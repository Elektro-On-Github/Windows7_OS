<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="ElektroWindows - WebOS">
    <meta name="keywords" content="ElektroWindows">
    <meta name="author" content="ElektroWindows">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="7.css">
    <style>
        .background {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        .deskicon .icon img {
            filter: drop-shadow(2px 2px 1px rgba(0,0,0,0.5));
        }
        
        .deskicon .icon:hover img {
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.8)) brightness(1.1);
        }
        
        .deskicon .icon:active img {
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5)) brightness(0.95);
        }
        
        .app-btn {
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3)) !important;
            transition: all 0.2s;
        }
        
        .app-btn:hover {
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)) brightness(1.1) !important;
            transform: scale(1.05);
        }
        
        .app-btn:active {
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.3)) brightness(0.95) !important;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<!-- div.background wrappa TUTTO per il blur effect -->
<div class="background">
    <img src="w7.jpg" class="wallpaper">
    <div class="glass-overlay"></div>
    <div class="deskicon">
        <div class="icon" id="icon-computer">
            <img src="computer.png">
            <span>My Computer</span>
        </div>
        <div class="icon" id="icon-ie">
            <img src="ie.png">
            <span>Internet Explorer</span>
        </div>
        <div class="icon" id="icon-start">
            <img src="start.png">
            <span>Start menu</span>
        </div>
    </div>

    <!-- Le finestre dinamiche verranno aggiunte qui -->
    <div id="windows-container"></div>

    <div class="bottombar">
        <img src="start.png" class="start-btn">
        <div class="separator"></div>
        <img src="computer.png" class="app-btn" id="taskbar-computer" title="My Computer">
        <img src="ie.png" class="app-btn" id="taskbar-ie" title="Internet Explorer">
        <div class="taskbar-clock"style="margin-left: auto; padding-right: 10px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;"></div>
    </div>
</div>

<script>
// Drag & drop per finestre stile Windows 7
function makeDraggable(win) {
  let isDragging = false, offsetX = 0, offsetY = 0;
  const handle = win.querySelector('.drag-handle');
  handle.style.cursor = 'move';
  handle.addEventListener('mousedown', function(e) {
    isDragging = true;
    const rect = win.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    win.style.zIndex = 10001;
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    win.style.left = (e.clientX - offsetX) + 'px';
    win.style.top = (e.clientY - offsetY) + 'px';
  });
  document.addEventListener('mouseup', function() {
    isDragging = false;
    document.body.style.userSelect = '';
    win.style.zIndex = '';
  });
}

// Resize per finestre stile Windows 7
function makeResizable(win) {
  let isResizing = false, startX = 0, startY = 0, startWidth = 0, startHeight = 0;
  const resizeHandle = win.querySelector('.resize-handle');
  if (!resizeHandle) return;
  
  resizeHandle.style.cursor = 'nwse-resize';
  resizeHandle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    isResizing = true;
    startX = e.clientX;
    startY = e.clientY;
    const rect = win.getBoundingClientRect();
    startWidth = rect.width;
    startHeight = rect.height;
    win.style.zIndex = 10001;
    document.body.style.userSelect = 'none';
  });
  
  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const deltaX = e.clientX - startX;
    const deltaY = e.clientY - startY;
    const newWidth = Math.max(200, startWidth + deltaX);
    const newHeight = Math.max(100, startHeight + deltaY);
    win.style.width = newWidth + 'px';
    win.style.height = newHeight + 'px';
    win.style.maxWidth = 'none';
  });
  
  document.addEventListener('mouseup', function() {
    isResizing = false;
    document.body.style.userSelect = '';
  });
}

function createWindow({id, title, content, icon}) {
  // Se già esiste, porta in primo piano
  let existing = document.getElementById(id);
  if (existing) {
    existing.style.display = '';
    existing.style.zIndex = 10001;
    return;
  }
  const win = document.createElement('div');
  win.className = 'window glass active draggable';
  win.id = id;
  win.style.position = 'absolute';
  win.style.left = Math.floor(Math.random()*200+100) + 'px';
  win.style.top = Math.floor(Math.random()*100+80) + 'px';
  win.style.width = '450px';
  win.style.height = '400px';
  win.style.display = 'flex';
  win.style.flexDirection = 'column';
  win.innerHTML = `
    <div class="title-bar drag-handle">
        <div class="title-bar-text">${icon ? `<img src='${icon}' style='height:16px;vertical-align:middle;margin-right:6px;'>` : ''}${title}</div>
        <div class="title-bar-controls">
            <button class="btn-min" aria-label="Minimize"></button>
            <button class="btn-max" aria-label="Maximize"></button>
            <button class="btn-close" aria-label="Close"></button>
        </div>
    </div>
    <div class="window-body has-space" style="flex: 1; overflow: auto; display: flex; flex-direction: column;">${content}</div>
    <div class="resize-handle" style="position: absolute; width: 15px; height: 15px; bottom: 0; right: 0; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, #666 50%); opacity: 0.5;"></div>
  `;
  document.getElementById('windows-container').appendChild(win);
  makeDraggable(win);
  makeResizable(win);
  // Chiudi
  win.querySelector('.btn-close').onclick = () => win.remove();
  // Maximize/Restore
  let isMax = false, prev = {};
  win.querySelector('.btn-max').onclick = function() {
    if (!isMax) {
      prev = {left: win.style.left, top: win.style.top, width: win.style.width, height: win.style.height};
      win.style.left = '0px';
      win.style.top = '0px';
      win.style.width = '100vw';
      win.style.height = '100vh';
      win.style.zIndex = 10001;
      isMax = true;
    } else {
      win.style.left = prev.left;
      win.style.top = prev.top;
      win.style.width = prev.width;
      win.style.height = prev.height;
      isMax = false;
    }
  };
  // Minimize
  win.querySelector('.btn-min').onclick = function() {
    win.style.display = 'none';
  };
}

// Funzione per Internet Explorer
function openIEWindow() {
  createWindow({
    id: 'window-ie',
    title: 'Internet Explorer',
    icon: 'ie.png',
    content: `<iframe src='https://www.wikipedia.com' style='width:100%;height:100%;border:0;flex:1;'></iframe>`
  });
}

// Struttura file system fittizia
const fileSystem = {
  'C:\\': {
    type: 'drive',
    items: {
      'Documents': {
        type: 'folder',
        items: {
          'Resume.docx': { type: 'file', icon: '📄' },
          'Progetti': {
            type: 'folder',
            items: {
              'WebOS': { type: 'file', icon: '📁' },
              'App.exe': { type: 'file', icon: '⚙️' }
            }
          }
        }
      },
      'Pictures': {
        type: 'folder',
        items: {
          'Vacation.jpg': { type: 'file', icon: '🖼️' },
          'Family.jpg': { type: 'file', icon: '🖼️' }
        }
      },
      'Downloads': {
        type: 'folder',
        items: {
          'Setup.exe': { type: 'file', icon: '⚙️' },
          'Driver.zip': { type: 'file', icon: '📦' }
        }
      },
      'Music': {
        type: 'folder',
        items: {
          'Song1.mp3': { type: 'file', icon: '🎵' },
          'Song2.mp3': { type: 'file', icon: '🎵' }
        }
      }
    }
  }
};

let currentPath = ['C:\\'];

function renderFileExplorer() {
  let current = fileSystem;
  for (let part of currentPath) {
    current = current[part].items;
  }
  
  let breadcrumb = `<div style="background:#f0f0f0;padding:8px;border-bottom:1px solid #ccc;font-size:12px;font-family:Segoe UI,monospace;">
    <span style="color:#0066cc;cursor:pointer;margin-right:5px;" onclick="window.navigateHome()">🏠 Home</span> &gt; ${currentPath.join(' &gt; ')}
  </div>`;
  
  let content = '<div style="padding:10px;">';
  
  if (currentPath.length > 1) {
    content += `
      <div style="display:flex;gap:15px;margin-bottom:15px;">
        <button onclick="window.navigateBack()" style="padding:5px 10px;cursor:pointer;background:#e0e0e0;border:1px solid #999;">← Back</button>
      </div>
    `;
  }
  
  content += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:15px;">';
  
  for (let [name, item] of Object.entries(current)) {
    if (item.type === 'folder') {
      content += `
        <div style="text-align:center;cursor:pointer;user-select:none;" ondblclick="window.openFolder('${name}')">
          <div style="font-size:36px;margin-bottom:5px;">📁</div>
          <div style="font-size:11px;word-wrap:break-word;max-width:80px;">${name}</div>
        </div>
      `;
    } else {
      content += `
        <div style="text-align:center;cursor:pointer;user-select:none;">
          <div style="font-size:36px;margin-bottom:5px;">${item.icon}</div>
          <div style="font-size:11px;word-wrap:break-word;max-width:80px;">${name}</div>
        </div>
      `;
    }
  }
  
  content += '</div></div>';
  return breadcrumb + content;
}

window.openFolder = function(folderName) {
  let current = fileSystem;
  for (let part of currentPath) {
    current = current[part].items;
  }
  if (current[folderName] && current[folderName].type === 'folder') {
    currentPath.push(folderName);
    let win = document.getElementById('window-mycomputer');
    if (win) {
      let body = win.querySelector('.window-body');
      body.innerHTML = renderFileExplorer();
    }
  }
};

window.navigateBack = function() {
  if (currentPath.length > 1) {
    currentPath.pop();
    let win = document.getElementById('window-mycomputer');
    if (win) {
      let body = win.querySelector('.window-body');
      body.innerHTML = renderFileExplorer();
    }
  }
};

window.navigateHome = function() {
  currentPath = ['C:\\'];
  let win = document.getElementById('window-mycomputer');
  if (win) {
    let body = win.querySelector('.window-body');
    body.innerHTML = renderFileExplorer();
  }
};

function openMyComputerWindow() {
  currentPath = ['C:\\'];
  createWindow({
    id: 'window-mycomputer',
    title: 'My Computer',
    icon: 'computer.png',
    content: renderFileExplorer()
  });
}

function openStartMenuWindow() {
  createWindow({
    id: 'window-start',
    title: 'Start Menu',
    icon: 'start.png',
    content: `
      <div style="padding:10px;">
        <button class="start-menu-btn" data-action="computer" style="width:100%;padding:12px;margin:5px 0;background:#e8e8e8;border:1px solid #999;cursor:pointer;text-align:left;font-size:13px;font-weight:bold;">📁 My Computer</button>
        <button class="start-menu-btn" data-action="ie" style="width:100%;padding:12px;margin:5px 0;background:#e8e8e8;border:1px solid #999;cursor:pointer;text-align:left;font-size:13px;font-weight:bold;">🌐 Internet Explorer</button>
        <hr style="margin:10px 0;border:none;border-top:1px solid #999;">
        <div style="font-size:11px;color:#666;">
          <p><b>Programmi</b></p>
          <p><b>Accessori</b></p>
          <p><b>Impostazioni</b></p>
          <p><b>Documenti</b></p>
        </div>
        <button class="start-menu-btn" data-action="shutdown" style="width:100%;padding:10px;margin-top:10px;background:#c00;color:white;border:none;cursor:pointer;font-weight:bold;">🔴 Arresta il sistema</button>
        <button class="start-menu-btn" data-action="music">🎵 Music Player</button>
      </div>
    `
  });

  // Aggiungi event listeners ai bottoni
  setTimeout(() => {
    document.querySelectorAll('.start-menu-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (btn.dataset.action === 'computer') {
          openMyComputerWindow();
        } else if (btn.dataset.action === 'ie') {
          openIEWindow();
        } else if (btn.dataset.action === 'shutdown') {
          alert('Sistema in arresto...');
        } else if (btn.dataset.action === 'music') {
          openMusicPlayer();
        }
      });
    });
  }, 0);
}

// Collega icone desktop
document.getElementById('icon-computer').onclick = openMyComputerWindow;
document.getElementById('icon-ie').onclick = openIEWindow;
document.getElementById('icon-start').onclick = openStartMenuWindow;

// Collega taskbar
document.getElementById('taskbar-computer').onclick = openMyComputerWindow;
document.getElementById('taskbar-ie').onclick = openIEWindow;
document.querySelector('.start-btn').onclick = openStartMenuWindow;

function openMusicPlayer() {
  createWindow({
    id: 'window-music',
    title: 'Music Player',
    icon: '🎵',
    content: `
      <div style="padding:10px; display:flex; flex-direction:column; gap:10px;">
        
        <input type="file" accept="audio/*" id="audioFile">

        <audio id="audioPlayer" controls style="width:100%;"></audio>

        <div style="display:flex; gap:10px;">
          <button onclick="document.getElementById('audioPlayer').play()">▶ Play</button>
          <button onclick="document.getElementById('audioPlayer').pause()">⏸ Pause</button>
        </div>

      </div>
    `
  });

  setTimeout(() => {
    const fileInput = document.getElementById('audioFile');
    const player = document.getElementById('audioPlayer');

    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        player.src = URL.createObjectURL(file);
        player.play();
      }
    });
  }, 0);
}
</script>

<!-- Clock script -->
<script>
function updateClock() {
  const el = document.getElementById('taskbar-clock');
  if (!el) return;
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  el.textContent = `${h}:${m}`;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
